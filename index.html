<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MMH · Dashboard Nhập khẩu Nha khoa</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
<style>
:root{
  --navy:#003047; --navy2:#0E2F5F; --blue:#3A5CAA; --blue2:#5188CC; --yellow:#FFE100;
  --bg:#F4F6F9; --card:#FFFFFF; --ink:#0E1F33; --t2:#44566B; --t3:#7E8CA0;
  --line:#E3E9F0; --pale:#F0F7FF; --pale2:#F7F9FC; --pos:#2E7D32; --neg:#C0392B;
  --shadow:0 1px 3px rgba(16,32,51,.06),0 4px 16px rgba(16,32,51,.05);
  --r:14px; --ff:'Be Vietnam Pro','Aptos',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
}
[data-theme="dark"]{
  --navy:#0A2A40; --bg:#0C1622; --card:#13202F; --ink:#E7EEF6; --t2:#A9B8C9; --t3:#73849A;
  --line:#22344A; --pale:#13283C; --pale2:#16232F; --shadow:0 1px 3px rgba(0,0,0,.3),0 6px 22px rgba(0,0,0,.35);
}
@import url('https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--ff);background:var(--bg);color:var(--ink);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
h1,h2,h3{font-weight:800;letter-spacing:-.01em}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
canvas{max-width:100%}
::-webkit-scrollbar{width:9px;height:9px}::-webkit-scrollbar-thumb{background:#C3CEDC;border-radius:6px}
[data-theme="dark"] ::-webkit-scrollbar-thumb{background:#2C3F56}

/* ── Loader ── */
#LD{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;transition:opacity .45s}
#LD.hide{opacity:0;pointer-events:none}
.spin{width:46px;height:46px;border:4px solid var(--line);border-top-color:var(--blue);border-radius:50%;animation:sp 1s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
#ldm{color:var(--t2);font-size:13.5px;text-align:center;max-width:440px}

/* ── Header ── */
.top{position:sticky;top:0;z-index:90;background:linear-gradient(180deg,var(--navy),var(--navy2));color:#fff;padding:0;box-shadow:0 2px 14px rgba(0,32,71,.22)}
.top-in{max-width:1500px;margin:0 auto;padding:12px 22px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:11px}
.logo{width:42px;height:42px;background:var(--yellow);color:var(--navy);font-weight:900;font-size:14px;border-radius:9px;display:flex;align-items:center;justify-content:center;letter-spacing:.5px;box-shadow:0 3px 10px rgba(255,225,0,.3)}
.brand h1{font-size:16.5px;line-height:1.15}
.brand .sub{font-size:11.5px;color:#A9C4DD;font-weight:500}
.top-tools{margin-left:auto;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.htool{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.16);border-radius:9px;padding:6px 10px;font-size:12px;font-weight:600;color:#EaF2Fb}
.htool select{background:transparent;border:none;color:#fff;font-weight:600;font-size:12px;outline:none}
.htool select option{color:#0E1F33}
.seg{display:flex;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.16);border-radius:9px;overflow:hidden}
.seg button{padding:6px 11px;font-size:12px;font-weight:600;color:#C5D6E8}
.seg button.on{background:var(--yellow);color:var(--navy)}
.hbtn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.16);border-radius:9px;padding:7px 11px;font-size:12px;font-weight:700;color:#fff;display:flex;align-items:center;gap:6px}
.hbtn:hover{background:rgba(255,255,255,.2)}
.src-link{color:#BED2E8;font-size:11.5px;text-decoration:none;border-bottom:1px dotted #6E89A6}
.src-link:hover{color:#fff}

/* ── Nav tabs ── */
.nav{position:sticky;top:0;z-index:80;background:var(--card);border-bottom:1px solid var(--line);box-shadow:var(--shadow)}
.nav-in{max-width:1500px;margin:0 auto;padding:0 22px;display:flex;gap:4px;overflow-x:auto}
.tab{padding:14px 18px;font-size:13.5px;font-weight:700;color:var(--t3);border-bottom:3px solid transparent;white-space:nowrap;transition:.16s}
.tab:hover{color:var(--blue)}
.tab.on{color:var(--blue);border-bottom-color:var(--blue)}

/* ── Time bar ── */
.timebar{background:var(--card);border-bottom:1px solid var(--line)}
.tb-in{max-width:1500px;margin:0 auto;padding:11px 22px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.tb-lbl{font-size:11px;font-weight:800;color:var(--t3);text-transform:uppercase;letter-spacing:.6px}
.yrtog{display:flex;gap:5px;flex-wrap:wrap}
.yb{padding:6px 13px;border-radius:8px;border:1.5px solid var(--line);background:var(--card);font-size:12.5px;font-weight:700;color:var(--t2);transition:.14s}
.yb:hover{border-color:var(--blue2)}
.yb.on{background:var(--blue);border-color:var(--blue);color:#fff}
.divx{width:1px;height:24px;background:var(--line)}

/* ── Layout ── */
.wrap{max-width:1500px;margin:0 auto;padding:22px}
.sec{display:none}.sec.on{display:block;animation:fade .4s}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.sh{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.sh h2{font-size:20px;color:var(--ink)}
.sh .nm{font-size:13px;color:var(--t3);font-weight:600}
.ctrl{display:flex;align-items:center;gap:9px;flex-wrap:wrap;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:11px 14px;margin-bottom:16px;box-shadow:var(--shadow)}
.cl{font-size:11px;font-weight:800;color:var(--t3);text-transform:uppercase;letter-spacing:.5px}
.sel{background:var(--card);border:1.5px solid var(--line);border-radius:8px;padding:7px 11px;font-size:13px;font-weight:600;color:var(--ink);outline:none;font-family:inherit}
.sel:focus{border-color:var(--blue)}
.chip{padding:6px 12px;border-radius:20px;border:1.5px solid var(--line);background:var(--card);font-size:12px;font-weight:700;color:var(--t2);transition:.14s}
.chip:hover{border-color:var(--blue2)}
.chip.on{background:var(--navy);border-color:var(--navy);color:#fff}

/* ── KPI ── */
.kr{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:14px;margin-bottom:18px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:16px 17px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.kpi::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--blue)}
.kpi.y::before{background:var(--yellow)}.kpi.pos::before{background:var(--pos)}.kpi.neg::before{background:var(--neg)}
.kl{font-size:11px;font-weight:800;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px;display:flex;align-items:center;gap:7px}
.kdelta{font-size:10.5px;padding:1px 6px;border-radius:5px;font-weight:800}
.kdelta.up{background:rgba(46,125,50,.13);color:var(--pos)}.kdelta.dn{background:rgba(192,57,43,.13);color:var(--neg)}.kdelta.fl{background:var(--pale);color:var(--t3)}
.kv{font-size:25px;font-weight:900;color:var(--navy);letter-spacing:-.02em;line-height:1.1}
[data-theme="dark"] .kv{color:#7FB0E6}
.knote{margin-top:8px;font-size:11px;color:var(--t2);background:var(--pale);border:1px solid var(--line);border-radius:7px;padding:4px 8px;display:inline-block}

/* ── Cards / grid ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.g23{display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-bottom:16px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:16px}
@media(max-width:980px){.g2,.g23,.g3{grid-template-columns:1fr}}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden}
.ch{padding:15px 17px 0}
.ct{font-size:14.5px;font-weight:800;color:var(--ink)}
.cs{font-size:11.5px;color:var(--t3);font-weight:600;margin-top:2px}
.cb{padding:15px 17px}
.cw{position:relative;height:300px}.cw.t{height:360px}.cw.s{height:240px}
.hint{font-size:11px;color:var(--t3);font-style:italic}
.dl-btn{margin-left:auto;font-size:11px;font-weight:700;color:var(--blue);background:var(--pale);border:1px solid var(--line);border-radius:7px;padding:5px 10px}

/* ── Rank list ── */
.rkr{display:flex;align-items:center;gap:11px;padding:9px 0;border-bottom:1px solid var(--line)}
.rkr:last-child{border-bottom:none}
.rkn{display:flex;align-items:center;gap:8px;min-width:190px;font-size:12.5px;font-weight:700;color:var(--ink)}
.sw{width:11px;height:11px;border-radius:3px;flex-shrink:0}
.rkt{flex:1;height:9px;background:var(--pale2);border-radius:5px;overflow:hidden}
.rkb{height:100%;border-radius:5px;transition:width .9s cubic-bezier(.2,.8,.2,1)}
.rkv{font-size:12px;font-weight:800;color:var(--t2);min-width:120px;text-align:right}

/* ── Table ── */
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12.5px}
thead th{background:var(--pale);color:var(--navy);font-weight:800;text-align:right;padding:10px 12px;position:sticky;top:0;white-space:nowrap;border-bottom:2px solid var(--line);font-size:11px;text-transform:uppercase;letter-spacing:.3px}
thead th.tl{text-align:left}
tbody td{padding:9px 12px;text-align:right;border-bottom:1px solid var(--line);color:var(--t2)}
tbody td.tl{text-align:left;color:var(--ink);font-weight:600}
tbody tr:hover{background:var(--pale2)}
tbody tr.mani{background:rgba(255,225,0,.09)}
tbody tr.mani td.tl{color:var(--navy);font-weight:800}
tr.clk{cursor:pointer}
tbody tr.tot{background:var(--pale);font-weight:800}
tbody tr.tot td{color:var(--navy)}

/* ── Insights ── */
.ins-strip{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px;margin-bottom:18px}
.ins{background:var(--card);border:1px solid var(--line);border-left:4px solid var(--blue);border-radius:10px;padding:12px 14px;box-shadow:var(--shadow)}
.ins-t{font-size:10.5px;font-weight:800;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;display:flex;align-items:center;gap:6px;margin-bottom:5px}
.ins-x{font-size:12.5px;color:var(--ink);font-weight:600;line-height:1.45}

/* reveal */
.reveal{opacity:0;transform:translateY(10px)}
.reveal.in{opacity:1;transform:none;transition:.5s cubic-bezier(.2,.8,.2,1)}

/* toast */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--navy);color:#fff;padding:12px 20px;border-radius:11px;font-size:13px;font-weight:600;box-shadow:0 8px 30px rgba(0,0,0,.25);z-index:9998;opacity:0;transition:.35s;display:flex;align-items:center;gap:9px;max-width:90vw}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.foot{text-align:center;padding:26px;color:var(--t3);font-size:11.5px}
.empty{color:var(--t3);padding:26px;text-align:center;font-size:13px}
</style>
</head>
<body>
<div id="LD"><div class="spin"></div><div id="ldm">Đang tải dữ liệu nhập khẩu…</div></div>

<header class="top">
  <div class="top-in">
    <div class="brand">
      <div class="logo">MMH</div>
      <div><h1 id="h-title">Dashboard Nhập khẩu Nha khoa</h1>
        <div class="sub" id="h-sub">Phân tích dữ liệu hải quan · HS 9018.49.00</div></div>
    </div>
    <div class="top-tools">
      <a class="src-link" id="src-link" href="#" target="_blank" rel="noopener">🔗 <span id="src-txt">Nguồn dữ liệu</span></a>
      <div class="htool"><span>💱</span><select id="cur-sel" onchange="onCurrency(this.value)">
        <option value="USD">USD</option><option value="VND">VND</option><option value="JPY">JPY</option></select></div>
      <div class="seg useg" id="metric-seg">
        <button id="u-val" class="on" onclick="onMetric('val')">Trị giá</button>
        <button id="u-qty" onclick="onMetric('qty')">Số lượng</button></div>
      <div class="seg">
        <button id="lang-vi" class="on" onclick="setLang('vi')">VI</button>
        <button id="lang-en" onclick="setLang('en')">EN</button></div>
      <button class="hbtn" id="theme-btn" onclick="toggleTheme()"><span id="theme-ic">🌙</span></button>
      <button class="hbtn" id="ppt-btn" onclick="exportPPT()"><span>📊</span> <span id="ppt-lbl">Xuất PPT</span></button>
    </div>
  </div>
</header>

<nav class="nav"><div class="nav-in" id="nav-tabs">
  <button class="tab on" data-tab="market" onclick="switchTab('market')">Tổng quan thị trường</button>
  <button class="tab" data-tab="brand" onclick="switchTab('brand')">Phân tích thương hiệu</button>
  <button class="tab" data-tab="ptype" onclick="switchTab('ptype')">Theo loại sản phẩm</button>
  <button class="tab" data-tab="vs" onclick="switchTab('vs')">So sánh trực tiếp</button>
</div></nav>

<div class="timebar"><div class="tb-in">
  <span class="tb-lbl" id="tb-lbl">Khoảng thời gian</span>
  <div class="yrtog" id="yr-tog"></div>
  <div class="divx"></div>
  <button class="chip" id="yr-all" onclick="selectAllYears()">Tất cả</button>
</div></div>

<div class="wrap">
  <section class="sec on" id="sec-market">
    <div class="sh"><h2 id="mk-h">Tổng quan thị trường nhập khẩu</h2><span class="nm" id="mk-name"></span></div>
    <div class="ctrl" id="mk-ctrl"></div>
    <div class="ins-strip" id="mk-ins"></div>
    <div class="kr" id="mk-kpi"></div>
    <div id="mk-body"></div>
  </section>
  <section class="sec" id="sec-brand">
    <div class="sh"><h2 id="br-h">Phân tích thương hiệu</h2><span class="nm" id="br-name"></span></div>
    <div class="ctrl" id="br-ctrl"></div>
    <div class="kr" id="br-kpi"></div>
    <div id="br-body"></div>
  </section>
  <section class="sec" id="sec-ptype">
    <div class="sh"><h2 id="pt-h">Phân tích theo loại sản phẩm</h2><span class="nm" id="pt-name"></span></div>
    <div class="ctrl" id="pt-ctrl"></div>
    <div class="kr" id="pt-kpi"></div>
    <div id="pt-body"></div>
  </section>
  <section class="sec" id="sec-vs">
    <div class="sh"><h2 id="vs-h">So sánh trực tiếp</h2><span class="nm" id="vs-name"></span></div>
    <div class="ctrl" id="vs-ctrl"></div>
    <div id="vs-body"></div>
  </section>
  <div class="foot" id="foot">MANI Medical Hanoi · Dashboard Nhập khẩu Nha khoa</div>
</div>

<div id="toast"></div>
<script>
/* ════════ CONFIG ════════ */
var GAS_URL="https://script.google.com/macros/s/AKfycbxUY-yKR4rJh5Cgt7ut-5vUMetclHuVb-MCg8cIFXZbkIu67Ys6Q-ZLcB_E4TtU_5Yj/exec";
var SHEET_URL="https://script.google.com/macros/s/AKfycbxUY-yKR4rJh5Cgt7ut-5vUMetclHuVb-MCg8cIFXZbkIu67Ys6Q-ZLcB_E4TtU_5Yj/exec";
var FX={USD:1, VND:25400, JPY:158};
var CUR_SYM={USD:"$", VND:"₫", JPY:"¥"};

/* ════════ STATE ════════ */
var S={
  tab:"market", metric:"val", currency:"USD",
  years:[], yearSel:{},
  charts:{},
  mkType:"ALL",
  brType:"ALL", brand:null, brTopN:15,
  ptype:null,
  vsA:null, vsB:null, vsType:"ALL"
};
var LANG="vi";
var ROWS=[], BRANDS=[], PTYPES=[], YEARS=[];

/* MMH brand palette for charts */
var MANI_NAMES=["mani","mani inc","mani.inc","mani co","mani co.,ltd","mani co.ltd"];
function isMani(n){return MANI_NAMES.indexOf(String(n||"").toLowerCase().trim())>=0 || /(^|\W)mani(\W|$)/i.test(String(n||""));}
var CAT_COLORS=["#3A5CAA","#5188CC","#00897B","#7E57C2","#EF6C00","#C0392B","#2E7D32","#0E2F5F","#8E44AD","#16A085","#D81B60","#5D4037","#455A64","#F9A825","#1565C0"];
function brandColor(n){if(isMani(n))return "#E6B800";var h=0;n=String(n||"");for(var i=0;i<n.length;i++)h=(h*31+n.charCodeAt(i))&0xffffff;return CAT_COLORS[Math.abs(h)%CAT_COLORS.length];}
function hexA(hex,a){hex=hex.replace("#","");var r=parseInt(hex.substr(0,2),16),g=parseInt(hex.substr(2,2),16),b=parseInt(hex.substr(4,2),16);return "rgba("+r+","+g+","+b+","+a+")";}

/* ════════ I18N ════════ */

 "empty":["Không có dữ liệu trong kỳ này","No data in this period"]
};
function t(k){var e=I18N[k];return e?(LANG==="vi"?e[0]:e[1]):k;}
function tPtype(p){if(p==="ALL")return t("ptype.ALL");return p;}

/* ════════ FORMAT ════════ */
function nf(n){return (Math.round(n||0)).toLocaleString(LANG==="vi"?"vi-VN":"en-US");}
function qf(n){n=n||0;if(Math.abs(n)>=1e9)return (n/1e9).toFixed(2)+"B";if(Math.abs(n)>=1e6)return (n/1e6).toFixed(2)+"M";if(Math.abs(n)>=1e3)return (n/1e3).toFixed(1)+"K";return nf(n);}
function toCur(usd){return (usd||0)*FX[S.currency];}
function money(usd){var v=toCur(usd),s=CUR_SYM[S.currency];if(S.currency==="VND"){if(Math.abs(v)>=1e9)return s+(v/1e9).toFixed(2)+" tỷ";if(Math.abs(v)>=1e6)return s+(v/1e6).toFixed(1)+"tr";return s+nf(v);}if(Math.abs(v)>=1e6)return s+(v/1e6).toFixed(2)+"M";if(Math.abs(v)>=1e3)return s+(v/1e3).toFixed(1)+"K";return s+nf(v);}
function moneyFull(usd){return CUR_SYM[S.currency]+nf(toCur(usd));}
function mval(usd){return money(usd);}
function esc(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

/* metric helpers */
function MV(o){return S.metric==="val"?(o.val||0):(o.pcs||0);}   // measure value for charts
function mfmt(v){return S.metric==="val"?money(v):qf(v)+" "+t("unit.pcs");}
function metricLabel(){return S.metric==="val"?t("metric.val"):t("metric.qty");}

/* ════════ FETCH ════════ */
function pick(o,keys){for(var i=0;i<keys.length;i++){if(o[keys[i]]!=null&&o[keys[i]]!=="")return o[keys[i]];}return undefined;}
function toNum(v){if(v==null||v==="")return 0;if(typeof v==="number")return v;var s=String(v).replace(/[^\d.,\-]/g,"");if(!s)return 0;if(s.indexOf(",")>=0&&s.indexOf(".")>=0)s=s.replace(/\./g,"").replace(",",".");else if(s.indexOf(",")>=0&&/,\d{1,2}$/.test(s))s=s.replace(",",".");else s=s.replace(/,/g,"");var n=parseFloat(s);return isNaN(n)?0:n;}
function parseYear(v){var n=toNum(v);if(n>=2000&&n<=2100)return Math.round(n);var m=String(v||"").match(/(20\d{2})/);return m?+m[1]:0;}

function normalizeRow(o){
  var brand=String(pick(o,["brand","Tên hãng","BH","ten_hang"])||"").trim();
  var ptype=String(pick(o,["ptype","Chủng loại","Loại sản phẩm","AY","chung_loai"])||"").trim();
  var lo=ptype.toLowerCase();
  if(ptype===""||lo==="other"||lo==="khác"||lo==="khac")ptype="Khác / Other";
  var year=parseYear(pick(o,["year","Năm","C","nam"]));
  var month=pick(o,["month","Tháng"])||"";
  var qty=toNum(pick(o,["qty","Lượng","W","luong"]));
  var pcs=toNum(pick(o,["pcs","Số lượng (PCS)","số lượng ( PCS)","BK","so_luong_pcs"]));
  if(!pcs&&qty)pcs=qty;
  var price=toNum(pick(o,["price","Đơn giá","Đơn giá khai báo(USD)","N","don_gia"]));
  var val=toNum(pick(o,["val","Trị giá USD","BM","tri_gia_usd"]));
  if(!val&&price&&pcs)val=price*pcs;
  if(!price&&val&&pcs)price=val/pcs;
  return {brand:brand||"Không rõ",ptype:ptype,year:year,month:month,qty:qty,pcs:pcs,price:price,val:val};
}

function fetchData(){
  return fetch(GAS_URL,{method:"GET"}).then(function(r){return r.json();}).then(function(j){
    if(!j||j.ok===false)throw new Error((j&&j.error)||"GAS error");
    var raw=j.rows||j.data||[];
    ROWS=raw.map(normalizeRow).filter(function(r){return r.year>0 || r.val>0 || r.pcs>0;});
    // dictionaries
    var bset={},pset={},yset={};
    ROWS.forEach(function(r){if(r.brand)bset[r.brand]=(bset[r.brand]||0)+r.val;if(r.ptype)pset[r.ptype]=(pset[r.ptype]||0)+r.val;if(r.year)yset[r.year]=1;});
    BRANDS=Object.keys(bset).sort(function(a,b){return bset[b]-bset[a];});
    PTYPES=Object.keys(pset).sort(function(a,b){return pset[b]-pset[a];});
    YEARS=Object.keys(yset).map(Number).sort(function(a,b){return a-b;});
    S.years=YEARS.slice();
    YEARS.forEach(function(y){S.yearSel[y]=true;});
    if(!S.brand)S.brand=BRANDS[0]||null;
    if(!S.ptype)S.ptype=PTYPES[0]||null;
    if(!S.vsA)S.vsA=BRANDS[0]||null;
    if(!S.vsB)S.vsB=BRANDS[1]||BRANDS[0]||null;
  });
}

/* ════════ FILTER ════════ */
function activeYears(){return YEARS.filter(function(y){return S.yearSel[y];});}
function filterRows(opt){
  opt=opt||{};
  return ROWS.filter(function(r){
    if(!S.yearSel[r.year])return false;
    if(opt.brand&&r.brand!==opt.brand)return false;
    if(opt.ptype&&opt.ptype!=="ALL"&&r.ptype!==opt.ptype)return false;
    return true;
  });
}
function aggBy(rows,keyFn){var m={};rows.forEach(function(r){var k=keyFn(r);if(k==null)return;if(!m[k])m[k]={key:k,qty:0,pcs:0,val:0,n:0,rows:[]};m[k].qty+=r.qty;m[k].pcs+=r.pcs;m[k].val+=r.val;m[k].n++;m[k].rows.push(r);});return m;}
function toArr(m){return Object.keys(m).map(function(k){return m[k];});}
function sortDesc(arr,f){return arr.slice().sort(function(a,b){return (b[f]||0)-(a[f]||0);});}

/* ════════ THEME / LANG / TOAST ════════ */
function applyTheme(th){document.documentElement.setAttribute("data-theme",th==="dark"?"dark":"light");document.getElementById("theme-ic").textContent=th==="dark"?"☀️":"🌙";try{localStorage.setItem("mmh_imp_theme",th);}catch(e){}}

function onMetric(m){S.metric=m;document.getElementById("u-val").classList.toggle("on",m==="val");document.getElementById("u-qty").classList.toggle("on",m==="qty");try{localStorage.setItem("mmh_imp_metric",m);}catch(e){}renderAll();}

function showToast(msg,kind){var el=document.getElementById("toast");var ic=kind==="success"?"✅":kind==="warn"?"⚠️":kind==="load"?"⏳":"ℹ️";el.innerHTML='<span>'+ic+'</span><span>'+esc(msg)+'</span>';el.classList.add("show");clearTimeout(window._tt);window._tt=setTimeout(function(){el.classList.remove("show");},3200);}

/* ════════ CHART AXIS HELPERS ════════ */
function axisColor(){return getComputedStyle(document.documentElement).getPropertyValue("--t2").trim()||"#44566B";}
function gridColor(){return document.documentElement.getAttribute("data-theme")==="dark"?"rgba(255,255,255,.06)":"rgba(16,32,51,.06)";}
function killC(id){if(S.charts[id]){try{S.charts[id].destroy();}catch(e){}delete S.charts[id];}}
Chart.register(ChartDataLabels);
Chart.defaults.font.family=FF;Chart.defaults.plugins.datalabels.display=false;

function barChart(id,cfg){

      tooltip:{callbacks:{label:function(it){var v=it.parsed[horizontal?"x":"y"];return (it.dataset.label?it.dataset.label+": ":"")+(cfg.fmt?cfg.fmt(v):nf(v));}},titleFont:{family:FF,size:12,weight:"800"},bodyFont:{family:FF,size:12},padding:11}},
    scales:{x:{stacked:stacked,grid:{display:horizontal,color:gridColor()},ticks:{font:{family:FF,size:10.5},color:axisColor(),callback:function(v){return horizontal?(cfg.fmt?cfg.fmt(v):qf(v)):this.getLabelForValue(v);}}},
      y:{stacked:stacked,grid:{display:!horizontal,color:gridColor()},ticks:{font:{family:FF,size:10.5},color:axisColor(),callback:function(v){return horizontal?this.getLabelForValue(v):(cfg.fmt?cfg.fmt(v):qf(v));}}}}

function donutChart(id,labels,data,colors,opt){

}

/* ════════ KPI / RANK / INSIGHT builders ════════ */
function kpiCard(o){
  var v=o.mode==="vnd"?money(o.val):o.mode==="p"?(o.val.toFixed(1)+"%"):o.mode==="n"?nf(o.val):o.mode==="raw"?o.val:qf(o.val);
  var delta=o.delta!=null?'<span class="kdelta '+(o.delta>0?"up":o.delta<0?"dn":"fl")+'">'+(o.delta>0?"▲":o.delta<0?"▼":"●")+" "+Math.abs(o.delta).toFixed(1)+'%</span>':"";
  return '<div class="kpi '+(o.cls||"")+'"><div class="kl">'+esc(o.lbl)+delta+'</div><div class="kv">'+v+'</div>'+(o.note?'<div class="knote">'+esc(o.note)+'</div>':'')+'</div>';
}
function rankList(items,opt){
  if(!items.length)return '<div class="empty">'+t("empty")+'</div>';
  var max=Math.max.apply(null,items.map(opt.valFn))||1;
  return items.map(function(a){var v=opt.valFn(a),w=v/max*100;return '<div class="rkr'+(isMani(a.key)?" mani":"")+'" '+(opt.onClick?'style="cursor:pointer" onclick="'+opt.onClick(a)+'"':'')+'><div class="rkn"><span class="sw" style="background:'+(opt.colorFn?opt.colorFn(a):brandColor(a.key))+'"></span>'+esc(opt.labelFn?opt.labelFn(a):a.key)+'</div><div class="rkt"><div class="rkb" style="width:'+w.toFixed(1)+'%;background:'+(opt.colorFn?opt.colorFn(a):brandColor(a.key))+'"></div></div><div class="rkv">'+opt.fmtFn(v)+(opt.subFn?' · '+opt.subFn(a):'')+'</div></div>';}).join("");
}
function insight(ic,title,txt){return '<div class="ins reveal"><div class="ins-t"><span class="ins-ic">'+ic+'</span>'+esc(title)+'</div><div class="ins-x">'+txt+'</div></div>';}
function afterRender(secId){setTimeout(function(){var s=document.getElementById(secId);if(!s)return;s.querySelectorAll(".reveal").forEach(function(el){el.classList.add("in");});},30);}

function walkExport(pres,ref,root){
